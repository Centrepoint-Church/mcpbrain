<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Graph — mcpbrain</title>
<style>
  :root{
    --ink:#12151b; --muted:#697280; --faint:#98a0ab; --line:#e6e8ee;
    --paper:#f4f6f9; --card:#ffffff; --signal:#0b5cff; --graph:#6a4cff;
    --mono:ui-monospace,"SF Mono","JetBrains Mono","Fira Mono","Consolas",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    --graph-bg:#ffffff; --graph-label:#12151b; --graph-fade:#c9ced7;
    --graph-link-idle:#dfe3ea; --graph-link-mute:#eef1f5; --graph-link-hot:#0b5cff;
    --graph-ring:#cdbff5; --graph-ring-text:#697280; --graph-node-fallback:#7a828d;
    --graph-person:#0b5cff; --graph-org:#6a4cff; --graph-project:#1f9d54;
    --graph-document:#b7791f; --graph-topic:#0e7490; --graph-meeting:#db2777;
    --graph-node-org:#5b7ea8;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--paper);color:var(--ink);font:15px/1.5 var(--sans);
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:14px;padding:12px 18px;
    border-bottom:1px solid var(--line);background:var(--card);flex:0 0 auto}
  .wordmark{font-weight:680;letter-spacing:-.01em}
  .eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.11em;color:var(--faint)}
  a.back{color:var(--muted);text-decoration:none;font-size:13px}
  a.back:hover{color:var(--ink)}
  .count{margin-left:auto;font-family:var(--mono);font-size:12.5px;color:var(--muted)}
  .layout{flex:1 1 auto;display:flex;min-height:0}
  .filters{flex:0 0 230px;border-right:1px solid var(--line);background:var(--card);
    padding:16px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
  .filters label{display:flex;flex-direction:column;gap:6px;font-size:11px;
    text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
  .filters input[type=range]{width:100%}
  .filters select,.filters input[type=text]{font:inherit;font-size:14px;padding:6px 8px;
    border:1px solid var(--line);border-radius:8px;background:#fff;text-transform:none;color:var(--ink)}
  .deg-val{font-family:var(--mono);color:var(--ink)}
  .hint{font-size:11px;color:var(--faint);line-height:1.4;text-transform:none;letter-spacing:0}
  #stage{flex:1 1 auto;position:relative;min-width:0;background:var(--graph-bg)}
  #graph{position:absolute;inset:0}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-size:14px;background:var(--paper);z-index:5;text-align:center;padding:24px}
  #overlay.hidden{display:none}
  #legend{position:absolute;top:12px;right:12px;z-index:8;background:rgba(255,255,255,.92);
    border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12px;
    box-shadow:0 2px 8px rgba(20,24,29,.06)}
  #legend h4{margin:0 0 7px;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);font-weight:700}
  #legend .row{display:flex;align-items:center;gap:7px;padding:1.5px 0;color:var(--ink)}
  #legend .sw{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
  .drawer{position:absolute;top:0;right:0;bottom:0;width:340px;z-index:9;background:var(--card);
    border-left:1px solid var(--line);box-shadow:-4px 0 18px rgba(20,24,29,.06);
    overflow-y:auto;padding:16px 18px;font-size:14px}
  .drawer[hidden]{display:none}
  .dw-x{position:absolute;top:10px;right:12px;border:0;background:none;font-size:20px;color:var(--muted);cursor:pointer}
  .dw-x:hover{color:var(--ink)}
  .dw-name{font-size:18px;font-weight:680;margin:2px 40px 2px 0}
  .dw-meta{color:var(--muted);font-size:12.5px;margin-bottom:12px}
  .dw-sec{margin-top:16px}
  .dw-sec h4{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin:0 0 6px}
  .dw-row{display:flex;gap:8px;padding:3px 0;font-size:13px;border-top:1px solid var(--line)}
  .dw-row:first-of-type{border-top:0}
  .dw-row .rel{color:var(--muted);flex:0 0 auto}
  .dw-field{display:flex;flex-direction:column;gap:3px;margin:6px 0}
  .dw-field label{font-size:11px;color:var(--muted)}
  .dw-field input,.dw-field textarea{font:inherit;padding:6px 8px;border:1px solid var(--line);border-radius:8px}
  .dw-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .dw-actions button{font:inherit;font-weight:600;border-radius:8px;padding:7px 12px;cursor:pointer;border:1px solid var(--line);background:#fff}
  .dw-actions .primary{background:var(--signal);color:#fff;border-color:transparent}
  .dw-actions .danger{color:var(--err,#d64545);border-color:#f0c9c9}
  .dw-search{position:relative}
  .dw-search input{width:100%}
  .dw-hits{list-style:none;margin:4px 0 0;padding:0;border:1px solid var(--line);border-radius:8px;max-height:160px;overflow:auto}
  .dw-hits li{padding:6px 9px;cursor:pointer;font-size:13px}
  .dw-hits li:hover{background:var(--idle-bg,#eef1f5)}
  .dw-err{color:var(--err,#d64545);font-size:12.5px;margin-top:8px}
</style>
</head>
<body>
  <header>
    <a class="back" href="/dashboard">← Dashboard</a>
    <span class="wordmark">mcpbrain</span>
    <span class="eyebrow">Knowledge graph</span>
    <span id="count" class="count"></span>
  </header>
  <div class="layout">
    <aside class="filters">
      <label>Search
        <input type="text" id="f-search" placeholder="highlight by name" autocomplete="off">
      </label>
      <div id="search-status" class="hint"></div>
      <label>Layout
        <select id="f-layout">
          <option value="radial" selected>Radial</option>
          <option value="emergent">Emergent</option>
        </select>
      </label>
      <label>Min connections <span class="deg-val" id="deg-val">7</span>
        <input type="range" id="f-degree" min="1" max="50" value="7">
      </label>
      <label>Organisation
        <select id="f-org"><option value="">All</option></select>
      </label>
      <label>Type
        <select id="f-type"><option value="">All</option></select>
      </label>
      <div class="hint">Drag to pan · scroll to zoom · drag a node to move it · hover for a name · click a node for details · right-click to focus its neighbourhood · double-click empty space to reset.</div>
    </aside>
    <div id="stage">
      <div id="graph"></div>
      <div id="legend"></div>
      <div id="overlay">Loading graph…</div>
      <aside id="drawer" class="drawer" hidden>
        <button id="dw-close" class="dw-x" aria-label="Close">×</button>
        <div id="dw-body"></div>
      </aside>
    </div>
  </div>

  <script src="/vendor/d3.min.js"></script>
  <script src="/vendor/force-graph.min.js"></script>
  <script>
    const TOKEN = "__MCPBRAIN_TOKEN__";
    const H = { headers: { Authorization: "Bearer " + TOKEN } };
    const reduce = window.matchMedia("(prefers-reduced-motion:reduce)").matches;
    const $ = (id) => document.getElementById(id);

    const TOP30_FRACTION = 0.30;  // links between two top-30%-connected nodes get flow particles
    const INTRA_COMMUNITY_BOOST = 3;  // same-community links pull harder so clusters emerge
    const DRAWER_W = 340;  // matches .drawer width — click-to-focus offsets so the node lands in the visible pane
    const CURVATURE_MAX = 0.3;  // max bend for links that share a node-pair or self-loop; single edges stay straight

    const TYPE_TOKEN = { person:"--graph-person", org:"--graph-org", project:"--graph-project",
                         document:"--graph-document", topic:"--graph-topic", meeting:"--graph-meeting" };
    const TYPE_ORDER = ["person","org","project","document","topic","meeting"];
    function readVar(n, fb=""){ const v = getComputedStyle(document.documentElement).getPropertyValue(n).trim(); return v || fb; }
    function readPalette(){
      const byType = {}; for (const [k,t] of Object.entries(TYPE_TOKEN)) byType[k] = readVar(t);
      return { bg:readVar("--graph-bg","#fff"), label:readVar("--graph-label","#12151b"),
        fade:readVar("--graph-fade","#c9ced7"), linkIdle:readVar("--graph-link-idle","#dfe3ea"),
        linkMute:readVar("--graph-link-mute","#eef1f5"), linkHot:readVar("--graph-link-hot","#0b5cff"),
        ring:readVar("--graph-ring","#cdbff5"), ringText:readVar("--graph-ring-text","#697280"),
        nodeFallback:readVar("--graph-node-fallback","#7a828d"),
        orgOrigin:readVar("--graph-node-org","#5b7ea8"), byType };
    }
    const palette = readPalette();

    // colour is by entity type, except org-baseline entities read as a
    // distinct, consistent colour regardless of type (Phase D: origin surfacing).
    function nodeColour(n){
      if (n.origin === "org") return palette.orgOrigin;
      return palette.byType[n.type] || palette.nodeFallback;
    }
    function nodeRadius(n){
      const conn = n.connections || 0, scale = window.innerWidth <= 768 ? 1.4 : 1;
      if (n.type === "org" || n.type === "project") return (8 + Math.min(conn*0.15, 12)) * scale;
      return (3 + Math.min(conn*0.08, 8)) * scale;
    }

    const state = { hoveredNodeId:null, selectedNodeId:null, mode:"map", egoNodeId:null,
                    egoDepth:1, egoHops:{}, layout:"radial", searchTerm:"" };
    let CURRENT = { nodes:[], links:[], communities:{} };
    let COMMUNITY = new Map(); // id -> community key (for link cohesion + intra/inter edges)
    let TOP30 = new Set();     // ids of the top-30% most-connected nodes
    let MAXDEG = 1;
    let NEIGHBORS = new Map(); // id -> Set of directly-linked neighbour ids (hover ring)
    let hoverRing = new Set(); // hovered node id + its neighbours, refreshed on hover

    function recomputeDerived(){
      COMMUNITY = new Map(); let maxd = 0;
      for (const n of CURRENT.nodes){
        COMMUNITY.set(n.id, n.community == null ? "—" : String(n.community));
        if ((n.connections||0) > maxd) maxd = n.connections||0;
      }
      MAXDEG = maxd || 1;
      TOP30 = new Set();
      const ranked = [...CURRENT.nodes].sort((a,b)=>(b.connections||0)-(a.connections||0));
      const cut = Math.ceil(ranked.length * TOP30_FRACTION);
      for (let i=0;i<cut;i++) TOP30.add(ranked[i].id);
      NEIGHBORS = new Map();
      for (const l of CURRENT.links){
        const sid = typeof l.source==="object"?l.source.id:l.source, tid = typeof l.target==="object"?l.target.id:l.target;
        (NEIGHBORS.get(sid) || NEIGHBORS.set(sid,new Set()).get(sid)).add(tid);
        (NEIGHBORS.get(tid) || NEIGHBORS.set(tid,new Set()).get(tid)).add(sid);
      }
    }

    // ---- ego (right-click focus) ----
    function computeEgoHops(nodes, links, focusId, depth){
      const hops = { [focusId]:0 }, adj = new Map();
      for (const l of links){ const s = typeof l.source==="object"?l.source.id:l.source, t = typeof l.target==="object"?l.target.id:l.target;
        (adj.get(s)||adj.set(s,new Set()).get(s)).add(t); (adj.get(t)||adj.set(t,new Set()).get(t)).add(s); }
      const q=[[focusId,0]];
      while(q.length){ const [id,d]=q.shift(); if(d>=depth) continue;
        for(const nb of adj.get(id)||[]) if(hops[nb]===undefined){ hops[nb]=d+1; q.push([nb,d+1]); } }
      return hops;
    }

    // ---- node colour (default force-graph rendering) + hover label + particles ----
    function nodeColourState(n){
      if (n.id === state.selectedNodeId) return palette.label;
      if (state.searchTerm) return (n.name||"").toLowerCase().includes(state.searchTerm) ? nodeColour(n) : palette.fade;
      return nodeColour(n);
    }
    // Names on hover only (force-graph's built-in nodeLabel). esc() (hoisted, below) guards XSS.
    function nodeHoverLabel(n){
      return '<div style="background:#1a1f27;color:#fff;border-radius:8px;padding:7px 10px;'
        + 'font:12.5px/1.4 -apple-system,system-ui,sans-serif;max-width:260px">'
        + '<b>' + esc(n.name) + '</b><br><span style="color:#c9ced7">'
        + esc(n.type || "") + ' · ' + esc(n.org || "no org") + ' · '
        + (n.connections || 0) + ' connections</span></div>';
    }
    // Flow particles: the selected node's links, OR links whose BOTH ends are top-30% connected.
    function linkParticlesFor(l){
      const sid = typeof l.source==="object"?l.source.id:l.source, tid = typeof l.target==="object"?l.target.id:l.target;
      if (state.selectedNodeId && (sid===state.selectedNodeId || tid===state.selectedNodeId)) return 4;
      return (TOP30.has(sid) && TOP30.has(tid)) ? 2 : 0;
    }
    // Deterministic 0..1 hash of a link's endpoints, used to desync particle start
    // positions — else same-length links would all pulse in unison.
    function linkKeyHash(l){
      const sid = typeof l.source==="object"?l.source.id:l.source, tid = typeof l.target==="object"?l.target.id:l.target;
      const s = String(sid) + "|" + String(tid) + "|" + (l.relation||"");
      let h = 0; for (let i=0;i<s.length;i++) h = (h*31 + s.charCodeAt(i)) | 0;
      return (h >>> 0) / 4294967295;
    }
    function linkParticleOffsetFor(l){ return linkKeyHash(l); }
    // Curve only links that would otherwise overlap: multiple relations between the same
    // two entities (either direction), or self-loops. Groups get evenly-spaced curvature
    // (reversed-direction edges flipped to the opposite side); a lone edge stays straight.
    function assignLinkCurvature(links){
      const pairGroups = new Map(), selfGroups = new Map();
      for (const l of links){
        const sid = typeof l.source==="object"?l.source.id:l.source, tid = typeof l.target==="object"?l.target.id:l.target;
        if (sid === tid){ (selfGroups.get(sid) || selfGroups.set(sid,[]).get(sid)).push(l); continue; }
        const key = String(sid) < String(tid) ? sid+"|"+tid : tid+"|"+sid;
        (pairGroups.get(key) || pairGroups.set(key,[]).get(key)).push(l);
      }
      for (const group of selfGroups.values())
        group.forEach((l,i)=>{ l.curvature = CURVATURE_MAX * (i+1) / group.length; });
      for (const group of pairGroups.values()){
        if (group.length === 1){ group[0].curvature = 0; continue; }
        const n = group.length, delta = 2*CURVATURE_MAX/(n-1);
        const firstSid = typeof group[0].source==="object"?group[0].source.id:group[0].source;
        group.forEach((l,i)=>{
          const sid = typeof l.source==="object"?l.source.id:l.source;
          let c = -CURVATURE_MAX + i*delta;
          if (sid !== firstSid) c *= -1;   // flip reversed-direction edges off the same arc
          l.curvature = c;
        });
      }
    }
    function sameCommunity(l){
      const s = typeof l.source==="object"?l.source.id:l.source, t = typeof l.target==="object"?l.target.id:l.target;
      return COMMUNITY.get(s) === COMMUNITY.get(t);
    }
    function linkColourFor(l){
      const focus = state.hoveredNodeId || state.selectedNodeId;
      const sid = typeof l.source==="object"?l.source.id:l.source, tid = typeof l.target==="object"?l.target.id:l.target;
      if (focus) return (sid===focus||tid===focus) ? palette.linkHot : palette.linkMute;
      if (state.searchTerm){ const sn=l.source?.name?.toLowerCase().includes(state.searchTerm), tn=l.target?.name?.toLowerCase().includes(state.searchTerm);
        return (sn||tn) ? palette.linkHot : palette.linkMute; }
      return sameCommunity(l) ? palette.linkMute : palette.linkIdle;   // cross-community links stay visible
    }
    function linkWidthFor(l){
      const focus = state.hoveredNodeId || state.selectedNodeId;
      const sid = typeof l.source==="object"?l.source.id:l.source, tid = typeof l.target==="object"?l.target.id:l.target;
      if (focus) return (sid===focus||tid===focus) ? 1.6 : 0.4;
      return sameCommunity(l) ? 0.3 : 0.6;
    }
    // Hover spotlight: a ring on the hovered node, and a softer one on its direct neighbours.
    function nodeRingMode(n){ return hoverRing.has(n.id) ? "before" : undefined; }
    function drawNodeRing(n, ctx){
      ctx.save();
      ctx.beginPath(); ctx.arc(n.x, n.y, (n._r ?? nodeRadius(n)) * 1.5, 0, 2*Math.PI, false);
      ctx.fillStyle = n.id === state.hoveredNodeId ? palette.linkHot : palette.ring;
      ctx.globalAlpha = 0.35; ctx.fill();
      ctx.restore();
    }
    function drawEgoRings(ctx){
      if (state.mode !== "ego" || !state.egoNodeId) return;
      const ringR = 90; ctx.save(); ctx.strokeStyle = palette.ring; ctx.lineWidth = 1;
      for (let hop=1; hop<=state.egoDepth; hop++){ ctx.beginPath(); ctx.arc(0,0,hop*ringR,0,2*Math.PI); ctx.stroke();
        ctx.fillStyle = palette.ringText; ctx.font = "11px "+getComputedStyle(document.body).fontFamily;
        ctx.textAlign="center"; ctx.textBaseline="bottom"; ctx.fillText(`${hop} hop${hop>1?"s":""}`, 0, -hop*ringR-4); }
      ctx.restore();
    }

    // ---- force-graph init ----
    const container = $("graph");
    const fg = new ForceGraph(container)
      .backgroundColor(palette.bg).nodeId("id").linkSource("source").linkTarget("target")
      .nodeRelSize(1).nodeVal((n)=>Math.pow(nodeRadius(n),2))
      .nodeColor(nodeColourState).nodeLabel(nodeHoverLabel)
      .nodeCanvasObjectMode(nodeRingMode).nodeCanvasObject(drawNodeRing)
      .linkColor(linkColourFor).linkWidth(linkWidthFor).linkCurvature("curvature")
      .linkDirectionalParticles(linkParticlesFor)
      .linkDirectionalParticleWidth(2).linkDirectionalParticleColor(()=> palette.linkHot)
      .linkDirectionalParticleSpeed(0.004).linkDirectionalParticleOffset(linkParticleOffsetFor)
      .onRenderFramePost((ctx)=> drawEgoRings(ctx))
      .onNodeHover((node)=>{
        state.hoveredNodeId = node?node.id:null; container.style.cursor = node?"pointer":"default";
        hoverRing = new Set();
        if (node){ hoverRing.add(node.id); for (const nb of NEIGHBORS.get(node.id)||[]) hoverRing.add(nb); }
      })
      .onNodeClick((node)=>{
        state.selectedNodeId = node.id; openDrawer(node.id);
        fg.centerAt(node.x + (DRAWER_W/2)/fg.zoom(), node.y, 600);   // keep node clear of the drawer
      })
      .onNodeRightClick((node)=> enterEgo(node.id))
      .onBackgroundClick(()=> onBg())
      .minZoom(0.05).maxZoom(20)
      .warmupTicks(reduce ? 80 : 30).cooldownTime(reduce ? 0 : 4000);

    fg.d3Force("charge", d3.forceManyBody().strength(-60).distanceMax(360));
    fg.d3Force("collide", d3.forceCollide().radius((n)=>(n._r ?? nodeRadius(n)) + 2));
    const linkF = fg.d3Force("link");
    if (linkF) linkF.distance(50).strength((l)=>{
      const s=(l.source.connections)||1, t=(l.target.connections)||1, base = 0.1/Math.min(s,t);
      return sameCommunity(l) ? base*INTRA_COMMUNITY_BOOST : base;   // communities coalesce organically
    });
    fg.d3AlphaDecay(0.02);

    // Emergent: charge + community-boosted links + a gentle centring pull (no positional grouping).
    // Radial: pull each node to a ring by degree — hubs centre, leaves outer.
    function radialRadius(n){ return 320 * (1 - Math.min(1, (n.connections||0) / MAXDEG)); }
    function applyLayout(){
      if (state.mode === "ego" && state.egoNodeId){ applyEgoForces(); return; }
      fg.d3Force("x", null); fg.d3Force("y", null);
      for (const n of CURRENT.nodes){ n.fx = undefined; n.fy = undefined; }
      if (state.layout === "radial"){
        fg.d3Force("center", null);
        fg.d3Force("radial", d3.forceRadial((n)=> radialRadius(n), 0, 0).strength(0.7));
      } else {
        fg.d3Force("radial", null);
        fg.d3Force("center", d3.forceCenter(0, 0).strength(0.04));
      }
    }
    function applyEgoForces(){
      fg.d3Force("center", null);
      const f = CURRENT.nodes.find((n)=>n.id===state.egoNodeId); if (f){ f.fx=0; f.fy=0; }
      for (const n of CURRENT.nodes) if (n.id!==state.egoNodeId){ n.fx=undefined; n.fy=undefined; }
      fg.d3Force("radial", d3.forceRadial((n)=>(state.egoHops[n.id]||0)*90,0,0).strength(0.8));
    }
    function reframe(){ setTimeout(()=> fg.zoomToFit(400, 60), reduce ? 50 : 1200); }
    function enterEgo(id){
      state.mode="ego"; state.egoNodeId=id; state.selectedNodeId=id;
      state.egoHops = computeEgoHops(CURRENT.nodes, CURRENT.links, id, state.egoDepth);
      applyEgoForces(); fg.d3ReheatSimulation();
    }
    function exitEgo(){ if (state.mode!=="ego") return; state.mode="map"; state.egoNodeId=null; state.egoHops={}; applyLayout(); fg.d3ReheatSimulation(); }
    function onBg(){ if (state.mode==="ego"){ exitEgo(); return; } state.selectedNodeId = null; }
    container.addEventListener("dblclick", ()=>{ if(!state.hoveredNodeId) exitEgo(); });

    // ---- legend (fixed entity-type colour key) ----
    function renderLegend(){
      const el = $("legend"); el.innerHTML = "<h4>Type</h4>";
      for (const t of TYPE_ORDER){ const row=document.createElement("div"); row.className="row";
        const sw=document.createElement("span"); sw.className="sw"; sw.style.background=palette.byType[t]||palette.nodeFallback;
        const lb=document.createElement("span"); lb.textContent=t;
        row.appendChild(sw); row.appendChild(lb); el.appendChild(row); }
      const orgRow=document.createElement("div"); orgRow.className="row";
      const orgSw=document.createElement("span"); orgSw.className="sw"; orgSw.style.background=palette.orgOrigin;
      const orgLb=document.createElement("span"); orgLb.textContent="org baseline";
      orgRow.appendChild(orgSw); orgRow.appendChild(orgLb); el.appendChild(orgRow);
    }
    renderLegend();

    // ---- sizing ----
    function fit(){ const r=$("stage").getBoundingClientRect(); fg.width(r.width).height(r.height); }
    fit(); new ResizeObserver(fit).observe($("stage"));

    // ---- filters + data ----
    function populateOptions(nodes){
      const orgs=new Set(), types=new Set();
      for (const n of nodes){ if(n.org) orgs.add(n.org); if(n.type) types.add(n.type); }
      for (const [sel,vals] of [["f-org",orgs],["f-type",types]]){ const el=$(sel), cur=el.value;
        el.innerHTML='<option value="">All</option>'; [...vals].sort().forEach((v)=>el.add(new Option(v,v))); el.value=cur; }
    }
    function filterQuery(){
      const p=new URLSearchParams(); p.set("min_conn", $("f-degree").value);
      if ($("f-org").value) p.set("org", $("f-org").value);
      if ($("f-type").value) p.set("type", $("f-type").value);
      return p.toString();
    }
    let loading=false;
    async function load(){
      if (loading) return; loading=true;
      const ov=$("overlay"); ov.textContent = "Loading graph…"; ov.classList.remove("hidden");
      try{
        const res = await fetch("/api/graph/canvas?"+filterQuery(), H);
        if (res.status===413){ const i=await res.json(); ov.textContent="Too many nodes ("+(i.candidate_count||"5000+")+") — raise “Min connections”."; loading=false; return; }
        if (!res.ok) throw new Error("HTTP "+res.status);
        const data = await res.json();
        CURRENT = { nodes:data.nodes, links:data.links, communities:data.communities||{} };
        populateOptions(data.nodes);
        $("count").textContent = data.nodes.length+" nodes · "+data.links.length+" links";
        if (!data.nodes.length){ ov.textContent="No entities match these filters."; loading=false; return; }
        for (const n of data.nodes) n._r = nodeRadius(n);
        assignLinkCurvature(data.links);
        state.mode="map"; state.egoNodeId=null; state.egoHops={};
        recomputeDerived(); applyLayout();
        fg.graphData({ nodes:data.nodes, links:data.links });
        reframe();
        ov.classList.add("hidden");
      }catch(e){ ov.textContent="Couldn’t load the graph. Is the daemon running?"; }
      finally{ loading=false; }
    }

    const deg=$("f-degree");
    deg.addEventListener("input", ()=>{ $("deg-val").textContent=deg.value; });
    deg.addEventListener("change", load);
    $("f-org").addEventListener("change", load);
    $("f-type").addEventListener("change", load);
    $("f-layout").addEventListener("change", (e)=>{ state.layout=e.target.value; applyLayout(); fg.d3ReheatSimulation(); reframe(); });
    // ---- search: highlight on-screen matches, or fetch-and-jump to an off-screen one ----
    function setSearchStatus(msg){ const el = $("search-status"); if (el) el.textContent = msg || ""; }
    // Merges a fetched entity+neighbourhood into the live graph without disturbing
    // existing node positions: reuses force-graph's own current node/link objects
    // (per its documented incremental-update pattern) and only appends genuinely new ones.
    function mergeEgoIntoCurrent(egoNodes, egoLinks){
      const { nodes: curNodes, links: curLinks } = fg.graphData();
      const haveNode = new Set(curNodes.map((n)=>n.id));
      const newNodes = egoNodes.filter((n)=> !haveNode.has(n.id));
      for (const n of newNodes) n._r = nodeRadius(n);
      const linkKey = (l)=>{
        const s = typeof l.source==="object"?l.source.id:l.source, t = typeof l.target==="object"?l.target.id:l.target;
        return s+"→"+t+"→"+(l.relation||"");
      };
      const haveLink = new Set(curLinks.map(linkKey));
      const newLinks = egoLinks.filter((l)=> !haveLink.has(linkKey(l)));
      const nodes = curNodes.concat(newNodes), links = curLinks.concat(newLinks);
      assignLinkCurvature(links);   // recompute across the merged set — a new parallel edge can change existing curvature
      CURRENT = { nodes, links, communities: CURRENT.communities };
      recomputeDerived();
      fg.graphData({ nodes, links });
      $("count").textContent = nodes.length+" nodes · "+links.length+" links";
    }
    async function jumpToEntity(id){
      try{
        const r = await fetch("/api/graph/ego?id="+encodeURIComponent(id)+"&hops=1", H);
        if (!r.ok){ setSearchStatus("Couldn’t load that entity."); return; }
        const eg = await r.json();
        mergeEgoIntoCurrent(eg.nodes, eg.links);
        fg.d3ReheatSimulation();
        state.selectedNodeId = id;
        openDrawer(id);
        setTimeout(()=>{
          const n = CURRENT.nodes.find((x)=>x.id===id);
          if (n) fg.centerAt(n.x + (DRAWER_W/2)/fg.zoom(), n.y, 600);
        }, reduce ? 50 : 300);
      }catch(e){ setSearchStatus("Couldn’t load that entity."); }
    }
    let searchT=null, searchSeq=0;
    async function runSearch(raw){
      const term = raw.toLowerCase();
      state.searchTerm = term; fg.nodeColor(fg.nodeColor());
      setSearchStatus("");
      if (!term) return;
      if (CURRENT.nodes.some((n)=> (n.name||"").toLowerCase().includes(term))) return;
      const mySeq = ++searchSeq;
      try{
        const r = await fetch("/api/graph/search?q="+encodeURIComponent(raw), H);
        if (!r.ok || mySeq!==searchSeq || state.searchTerm!==term) return;
        const hits = await r.json();
        if (mySeq!==searchSeq || state.searchTerm!==term) return;   // user kept typing — drop this stale result
        if (!hits.length){ setSearchStatus(`No entity matches “${raw}”.`); return; }
        const hit = hits[0];
        setSearchStatus(`Found “${hit.name}” outside the current filters — added it to the map.`);
        await jumpToEntity(hit.id);
      }catch(e){ setSearchStatus("Search failed."); }
    }
    $("f-search").addEventListener("input", (e)=>{ clearTimeout(searchT);
      const raw = e.target.value.trim();
      searchT=setTimeout(()=> runSearch(raw), 220); });

    // ---- entity drawer ----
    const dw = $("drawer"), dwBody = $("dw-body");
    let dwId = null, dwData = null;
    $("dw-close").addEventListener("click", closeDrawer);
    function closeDrawer(){ dw.hidden = true; dwId = null; dwData = null; }
    function esc(s){ const d = document.createElement("div"); d.textContent = s == null ? "" : s; return d.innerHTML; }
    // esc() is safe for TEXT-node contexts only (it doesn't escape quotes). For
    // quoted HTML attributes use escAttr(), which also escapes " and '.
    function escAttr(s){ return String(s == null ? "" : s)
      .replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")
      .replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    async function openDrawer(id){
      dwId = id; dw.hidden = false; dwBody.textContent = "Loading…";
      try{
        const r = await fetch("/api/graph/entity/" + encodeURIComponent(id), H);
        if (r.status === 404){ dwBody.textContent = "Entity not found."; return; }
        if (!r.ok) throw new Error("HTTP " + r.status);
        dwData = await r.json(); renderDrawer();
      }catch(e){ dwBody.textContent = "Couldn’t load this entity."; }
    }

    function relList(items){
      if (!items.length) return '<div class="dw-row" style="color:var(--muted)">none</div>';
      return items.map(x => `<div class="dw-row"><span class="rel">${esc(x.relation)}</span>`
        + `<span>${esc(x.other_name)}</span></div>`).join("");
    }
    function renderDrawer(){
      const d = dwData;
      dwBody.innerHTML =
        `<div class="dw-name">${esc(d.name)}</div>`
        + `<div class="dw-meta">${esc(d.type)} · ${esc(d.org || "no org")} · ${d.connections} connections`
        + (d.email_addr ? " · " + esc(d.email_addr) : "") + `</div>`
        + `<div class="dw-actions"><button id="dw-edit" class="primary">Edit</button>`
        + `<button id="dw-merge-btn">Merge…</button>`
        + `<button id="dw-suppress" class="danger">Suppress</button></div>`
        + `<div id="dw-inline"></div>`
        + `<div class="dw-sec"><h4>Relations</h4>${relList(d.relations)}</div>`
        + `<div class="dw-sec"><h4>Backlinks</h4>${relList(d.backlinks)}</div>`
        + `<div class="dw-sec"><h4>Observations</h4>`
        + (d.observations.length ? d.observations.map(o =>
            `<div class="dw-row"><span class="rel">${esc(o.attribute)}</span><span>${esc(o.value)}`
            + (o.valid_from ? ` <span style="color:var(--faint)">(${esc(o.valid_from)})</span>` : "")
            + `</span></div>`).join("")
          : '<div class="dw-row" style="color:var(--muted)">none</div>') + `</div>`;
      $("dw-edit").onclick = renderEdit;
      $("dw-merge-btn").onclick = renderMerge;
      $("dw-suppress").onclick = doSuppress;
    }

    function renderEdit(){
      const d = dwData, box = $("dw-inline");
      box.innerHTML =
        field("Name","dw-f-name",d.name) + field("Organisation","dw-f-org",d.org)
        + field("Email","dw-f-email",d.email_addr) + field("Notes","dw-f-notes",d.notes,true)
        + `<div class="dw-actions"><button id="dw-save" class="primary">Save</button>`
        + `<button id="dw-cancel">Cancel</button></div><div id="dw-edit-err" class="dw-err"></div>`;
      $("dw-cancel").onclick = renderDrawer;
      $("dw-save").onclick = doSave;
    }
    function field(label,id,val,area){
      const input = area ? `<textarea id="${id}" rows="2">${esc(val)}</textarea>`
                         : `<input id="${id}" value="${escAttr(val)}">`;
      return `<div class="dw-field"><label>${label}</label>${input}</div>`;
    }
    async function doSave(){
      const body = { name: $("dw-f-name").value.trim(), org: $("dw-f-org").value.trim(),
                     email_addr: $("dw-f-email").value.trim(), notes: $("dw-f-notes").value };
      try{
        const r = await fetch("/api/graph/entity/" + encodeURIComponent(dwId),
          { method:"POST", headers:{...H.headers,"Content-Type":"application/json"}, body:JSON.stringify(body) });
        if (!r.ok) throw new Error("HTTP " + r.status);
        dwData = await r.json(); renderDrawer(); load();   // refresh map (name/colour)
      }catch(e){ const el = $("dw-edit-err"); if (el) el.textContent = "Save failed."; }
    }

    function renderMerge(){
      const box = $("dw-inline");
      box.innerHTML = `<div class="dw-sec"><h4>Merge “${esc(dwData.name)}” into…</h4>`
        + `<div class="dw-search"><input id="dw-q" placeholder="search entity to keep" autocomplete="off">`
        + `<ul id="dw-hits" class="dw-hits" hidden></ul></div>`
        + `<div id="dw-merge-err" class="dw-err"></div>`
        + `<div class="dw-actions"><button id="dw-merge-cancel">Cancel</button></div></div>`;
      $("dw-merge-cancel").onclick = renderDrawer;
      let t = null;
      $("dw-q").addEventListener("input", (e)=>{ clearTimeout(t);
        t = setTimeout(()=> searchTargets(e.target.value.trim()), 180); });
    }
    async function searchTargets(q){
      const ul = $("dw-hits");
      if (!q){ ul.hidden = true; return; }
      try{
        const r = await fetch("/api/graph/search?q=" + encodeURIComponent(q), H);
        const hits = (await r.json()).filter(h => h.id !== dwId).slice(0, 8);
        ul.innerHTML = hits.map(h => `<li data-id="${escAttr(h.id)}">${esc(h.name)} `
          + `<span style="color:var(--faint)">${esc(h.type)}${h.org ? " · " + esc(h.org) : ""}</span></li>`).join("");
        ul.hidden = hits.length === 0;
        [...ul.children].forEach(li => li.onclick = ()=> confirmMerge(li.dataset.id, li.textContent));
      }catch(e){ ul.hidden = true; }
    }
    async function confirmMerge(winnerId, winnerLabel){
      if (!window.confirm(`Merge “${dwData.name}” into “${winnerLabel}”?\n\nIts links move to the kept entity, and “${dwData.name}” becomes an alias. Reversible only via the store.`)) return;
      try{
        const r = await fetch("/api/graph/merge",
          { method:"POST", headers:{...H.headers,"Content-Type":"application/json"},
            body: JSON.stringify({ loser_id: dwId, winner_id: winnerId }) });
        const out = await r.json();
        if (r.ok && out.ok){ closeDrawer(); load(); }
        else { const el = $("dw-merge-err"); if (el) el.textContent = out.message || "Merge refused."; }
      }catch(e){ const el = $("dw-merge-err"); if (el) el.textContent = "Merge failed."; }
    }

    async function doSuppress(){
      if (!window.confirm(`Suppress “${dwData.name}”? It’s hidden from the graph (reversible).`)) return;
      try{
        const r = await fetch("/api/graph/entity/" + encodeURIComponent(dwId), { method:"DELETE", headers: H.headers });
        if (r.ok){ closeDrawer(); load(); }
      }catch(e){ /* leave drawer open on failure */ }
    }

    load();
  </script>
</body>
</html>
