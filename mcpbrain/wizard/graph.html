<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Graph — mcpbrain</title>
<style>
  :root{
    --ink:#12151b; --muted:#697280; --faint:#98a0ab; --line:#e6e8ee;
    --paper:#f4f6f9; --card:#ffffff; --signal:#0b5cff; --graph:#6a4cff;
    --mono:ui-monospace,"SF Mono","JetBrains Mono","Fira Mono","Consolas",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;

    /* graph canvas tokens (read at runtime by the renderer) — mcpbrain-tuned */
    --graph-bg:#ffffff;
    --graph-label:#12151b;
    --graph-fade:#c9ced7;
    --graph-link-idle:#dfe3ea;
    --graph-link-mute:#eef1f5;
    --graph-link-hot:#0b5cff;
    --graph-ring:#cdbff5;
    --graph-ring-text:#697280;
    --graph-node-fallback:#7a828d;
    --graph-person:#0b5cff;
    --graph-org:#6a4cff;
    --graph-project:#1f9d54;
    --graph-document:#b7791f;
    --graph-topic:#0e7490;
    --graph-meeting:#db2777;
    --graph-community-0:#0b5cff;  --graph-community-1:#6a4cff;  --graph-community-2:#1f9d54;
    --graph-community-3:#b7791f;  --graph-community-4:#0e7490;  --graph-community-5:#d64545;
    --graph-community-6:#9333ea;  --graph-community-7:#c2410c;  --graph-community-8:#0891b2;
    --graph-community-9:#4d7c0f;  --graph-community-10:#db2777; --graph-community-11:#7c3aed;
    --graph-community-12:#059669; --graph-community-13:#ca8a04; --graph-community-14:#2563eb;
    --graph-community-15:#dc2626; --graph-community-16:#0d9488; --graph-community-17:#a21caf;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--paper);color:var(--ink);font:15px/1.5 var(--sans);
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:14px;padding:12px 18px;
    border-bottom:1px solid var(--line);background:var(--card);flex:0 0 auto}
  .wordmark{font-weight:680;letter-spacing:-.01em}
  .eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.11em;color:var(--faint)}
  a.back{color:var(--muted);text-decoration:none;font-size:13px}
  a.back:hover{color:var(--ink)}
  .count{margin-left:auto;font-family:var(--mono);font-size:12.5px;color:var(--muted)}
  .layout{flex:1 1 auto;display:flex;min-height:0}
  .filters{flex:0 0 230px;border-right:1px solid var(--line);background:var(--card);
    padding:16px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
  .filters label{display:flex;flex-direction:column;gap:6px;font-size:11px;
    text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
  .filters input[type=range]{width:100%}
  .filters select,.filters input[type=text]{font:inherit;font-size:14px;padding:6px 8px;
    border:1px solid var(--line);border-radius:8px;background:#fff;text-transform:none;color:var(--ink)}
  .deg-val{font-family:var(--mono);color:var(--ink)}
  .hint{font-size:11px;color:var(--faint);line-height:1.4;text-transform:none;letter-spacing:0}
  #stage{flex:1 1 auto;position:relative;min-width:0;background:var(--graph-bg)}
  #graph{position:absolute;inset:0}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-size:14px;background:var(--paper);z-index:5;text-align:center;padding:24px}
  #overlay.hidden{display:none}
  #tooltip{position:absolute;z-index:10;pointer-events:none;display:none;
    background:#1a1f27;color:#fff;border-radius:8px;padding:7px 10px;font-size:12.5px;
    max-width:260px;line-height:1.4}
  #tooltip b{font-weight:640}
  #tooltip .sub{color:#c9ced7}
</style>
</head>
<body>
  <header>
    <span class="wordmark">mcpbrain</span>
    <span class="eyebrow">Knowledge graph</span>
    <a class="back" href="/dashboard">← Dashboard</a>
    <span id="count" class="count"></span>
  </header>
  <div class="layout">
    <aside class="filters">
      <label>Min connections <span class="deg-val" id="deg-val">7</span>
        <input type="range" id="f-degree" min="1" max="50" value="7">
      </label>
      <label>Colour by
        <select id="f-colour">
          <option value="community" selected>Community</option>
          <option value="type">Type</option>
          <option value="org">Organisation</option>
        </select>
      </label>
      <label>Organisation
        <select id="f-org"><option value="">All</option></select>
      </label>
      <label>Type
        <select id="f-type"><option value="">All</option></select>
      </label>
      <label>Search
        <input type="text" id="f-search" placeholder="highlight by name" autocomplete="off">
      </label>
      <div class="hint">Drag to pan · scroll to zoom · drag a node to move it · right-click a node to focus its neighbourhood · double-click empty space to reset.</div>
    </aside>
    <div id="stage">
      <div id="graph"></div>
      <div id="overlay">Loading graph…</div>
      <div id="tooltip"></div>
    </div>
  </div>

  <script src="/vendor/d3.min.js"></script>
  <script src="/vendor/force-graph.min.js"></script>
  <script>
    const TOKEN = "__MCPBRAIN_TOKEN__";
    const H = { headers: { Authorization: "Bearer " + TOKEN } };
    const reduce = window.matchMedia("(prefers-reduced-motion:reduce)").matches;
    const $ = (id) => document.getElementById(id);

    // ---- palette: resolve --graph-* CSS tokens at runtime (ported from canvas.ts) ----
    const TYPE_TOKEN = { person:"--graph-person", org:"--graph-org", project:"--graph-project",
                         document:"--graph-document", topic:"--graph-topic", meeting:"--graph-meeting" };
    function readVar(name, fb=""){ const v = getComputedStyle(document.documentElement)
        .getPropertyValue(name).trim(); return v || fb; }
    function readPalette(){
      const byType = {}; for (const [k,t] of Object.entries(TYPE_TOKEN)) byType[k] = readVar(t);
      const community = []; for (let i=0;i<18;i++) community.push(readVar(`--graph-community-${i}`));
      return {
        bg: readVar("--graph-bg","#ffffff"), label: readVar("--graph-label","#12151b"),
        fade: readVar("--graph-fade","#c9ced7"), linkIdle: readVar("--graph-link-idle","#dfe3ea"),
        linkMute: readVar("--graph-link-mute","#eef1f5"), linkHot: readVar("--graph-link-hot","#0b5cff"),
        ring: readVar("--graph-ring","#cdbff5"), ringText: readVar("--graph-ring-text","#697280"),
        nodeFallback: readVar("--graph-node-fallback","#7a828d"), byType, community,
      };
    }
    let palette = readPalette();

    // deterministic colour for an org name (mcpbrain has no fixed org list)
    function hashIndex(s, n){ let h=0; for (let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h % n; }
    function nodeColour(n, mode){
      if (mode === "org") return n.org ? palette.community[hashIndex(n.org, palette.community.length)] : palette.nodeFallback;
      if (mode === "community") return n.community != null
        ? (palette.community[n.community % palette.community.length] || palette.nodeFallback)
        : palette.nodeFallback;
      return palette.byType[n.type] || palette.nodeFallback;
    }
    function nodeRadius(n){
      const conn = n.connections || 0;
      const scale = window.innerWidth <= 768 ? 1.4 : 1;
      if (n.type === "org" || n.type === "project") return (8 + Math.min(conn*0.15, 12)) * scale;
      return (3 + Math.min(conn*0.08, 8)) * scale;
    }
    function computeEgoHops(nodes, links, focusId, depth){
      const hops = { [focusId]: 0 }; const adj = new Map();
      for (const l of links){
        const s = typeof l.source==="object"? l.source.id : l.source;
        const t = typeof l.target==="object"? l.target.id : l.target;
        if (!adj.has(s)) adj.set(s, new Set()); if (!adj.has(t)) adj.set(t, new Set());
        adj.get(s).add(t); adj.get(t).add(s);
      }
      const q = [[focusId,0]];
      while (q.length){ const [id,d] = q.shift(); if (d>=depth) continue;
        for (const nb of adj.get(id) || []) if (hops[nb]===undefined){ hops[nb]=d+1; q.push([nb,d+1]); } }
      return hops;
    }

    const state = { hoveredNodeId:null, selectedNodeId:null, mode:"canvas",
                    egoNodeId:null, egoDepth:1, egoHops:{}, colourMode:"community", searchTerm:"" };

    // ---- draw + link styling (ported from canvas.ts) ----
    function drawNode(node, ctx){
      const r = node._r ?? nodeRadius(node);
      const isSel = node.id === state.selectedNodeId, isHov = node.id === state.hoveredNodeId;
      const isEgo = state.mode === "ego" && state.egoNodeId === node.id;
      const searching = state.searchTerm.length > 0;
      const match = !searching || node.name.toLowerCase().includes(state.searchTerm);
      const fill = isSel ? palette.label : (searching && !match ? palette.fade : nodeColour(node, state.colourMode));
      ctx.beginPath(); ctx.arc(node.x ?? 0, node.y ?? 0, r, 0, 2*Math.PI); ctx.fillStyle = fill; ctx.fill();
      if (isHov || (searching && match)){ ctx.strokeStyle = palette.label; ctx.lineWidth = 1.5; ctx.stroke(); }
      const showLabel = isEgo || r > 7 || isHov || isSel || (searching && match) ||
        (state.mode === "ego" && state.egoHops[node.id] !== undefined && (node.connections ?? 0) >= 3);
      if (!showLabel) return;
      const fontSize = isEgo ? 14 : Math.max(9, Math.min(12, r*1.2));
      ctx.font = `${isEgo?"bold ":""}${fontSize}px ${getComputedStyle(document.body).fontFamily}`;
      ctx.textAlign = "center"; ctx.textBaseline = "top";
      ctx.save(); ctx.globalAlpha = searching && !match ? 0.30 : 0.85; ctx.fillStyle = palette.label;
      ctx.fillText(node.name, node.x ?? 0, (node.y ?? 0) + r + 3); ctx.restore();
    }
    function linkColourFor(l){
      const sid = typeof l.source==="object"? l.source.id : l.source;
      const tid = typeof l.target==="object"? l.target.id : l.target;
      if (state.searchTerm){
        const sn = l.source?.name?.toLowerCase().includes(state.searchTerm);
        const tn = l.target?.name?.toLowerCase().includes(state.searchTerm);
        return (sn || tn) ? palette.linkHot : palette.linkMute;
      }
      const focus = state.hoveredNodeId || state.selectedNodeId;
      if (!focus) return palette.linkIdle;
      return (sid === focus || tid === focus) ? palette.linkHot : palette.linkMute;
    }
    function linkWidthFor(l){
      const focus = state.hoveredNodeId || state.selectedNodeId;
      if (!focus && !state.searchTerm) return 0.6;
      const sid = typeof l.source==="object"? l.source.id : l.source;
      const tid = typeof l.target==="object"? l.target.id : l.target;
      return (sid === focus || tid === focus) ? 1.6 : 0.4;
    }
    function drawEgoRings(ctx){
      if (state.mode !== "ego" || !state.egoNodeId) return;
      const ringR = 90; ctx.save(); ctx.strokeStyle = palette.ring; ctx.lineWidth = 1;
      for (let hop=1; hop<=state.egoDepth; hop++){
        ctx.beginPath(); ctx.arc(0,0,hop*ringR,0,2*Math.PI); ctx.stroke();
        ctx.fillStyle = palette.ringText; ctx.font = "11px "+getComputedStyle(document.body).fontFamily;
        ctx.textAlign = "center"; ctx.textBaseline = "bottom";
        ctx.fillText(`${hop} hop${hop>1?"s":""}`, 0, -hop*ringR - 4);
      }
      ctx.restore();
    }

    // ---- force-graph init (ported from canvas.ts initCanvas) ----
    const container = $("graph");
    const fg = new ForceGraph(container)
      .backgroundColor(palette.bg)
      .nodeId("id").linkSource("source").linkTarget("target")
      .nodeRelSize(1)
      .nodeVal((n) => Math.pow(n._r ?? nodeRadius(n), 2))
      .nodeLabel(() => "")
      .linkColor(linkColourFor).linkWidth(linkWidthFor)
      .nodeCanvasObject((node, ctx) => drawNode(node, ctx))
      .onNodeClick((node) => { state.selectedNodeId = node.id; })
      .onNodeHover((node) => {
        state.hoveredNodeId = node ? node.id : null;
        container.style.cursor = node ? "pointer" : "default";
        showTooltip(node);
      })
      .onNodeDrag(() => hideTooltip())
      .onBackgroundClick(() => { if (state.mode !== "ego") state.selectedNodeId = null; })
      .onNodeRightClick((node) => enterEgo(node.id))
      .onRenderFramePost((ctx) => drawEgoRings(ctx))
      .warmupTicks(reduce ? 60 : 30)
      .cooldownTime(reduce ? 0 : 4000);

    fg.d3Force("charge", d3.forceManyBody().strength(-80).distanceMax(300));
    fg.d3Force("collide", d3.forceCollide().radius((n) => (n._r ?? nodeRadius(n)) + 2));
    const linkF = fg.d3Force("link");
    if (linkF) linkF.distance(60).strength((l) => {
      const s = (l.source.connections)||1, t = (l.target.connections)||1; return 0.1 / Math.min(s,t);
    });
    fg.d3AlphaDecay(0.02);

    let CURRENT = { nodes: [], links: [] };
    function applyFreeForces(nodes){
      for (const n of nodes){ n.fx = undefined; n.fy = undefined; }
      fg.d3Force("radial", null);
      fg.d3Force("center", d3.forceCenter(0,0).strength(0.05));
    }
    function applyEgoForces(nodes){
      const focus = nodes.find((n) => n.id === state.egoNodeId);
      if (focus){ focus.fx = 0; focus.fy = 0; }
      for (const n of nodes) if (n.id !== state.egoNodeId){ n.fx = undefined; n.fy = undefined; }
      fg.d3Force("radial", d3.forceRadial((n) => (state.egoHops[n.id]||0)*90, 0, 0).strength(0.8));
      fg.d3Force("center", null);
    }
    function setData(nodes, links){
      for (const n of nodes) n._r = nodeRadius(n);
      CURRENT = { nodes, links };
      if (state.mode === "ego" && state.egoNodeId) applyEgoForces(nodes); else applyFreeForces(nodes);
      fg.graphData({ nodes, links });
    }
    function enterEgo(id){
      state.mode = "ego"; state.egoNodeId = id; state.selectedNodeId = id;
      state.egoHops = computeEgoHops(CURRENT.nodes, CURRENT.links, id, state.egoDepth);
      applyEgoForces(CURRENT.nodes); fg.d3ReheatSimulation();
    }
    function exitEgo(){
      if (state.mode !== "ego") return;
      state.mode = "canvas"; state.egoNodeId = null; state.egoHops = {};
      applyFreeForces(CURRENT.nodes); fg.d3ReheatSimulation();
    }
    // force-graph has no background dblclick event; use the canvas element.
    container.addEventListener("dblclick", () => { if (!state.hoveredNodeId) exitEgo(); });

    // ---- tooltip ----
    const tip = $("tooltip");
    function showTooltip(node){
      if (!node){ hideTooltip(); return; }
      const hop = state.mode === "ego" ? state.egoHops[node.id] : undefined;
      tip.innerHTML = "";
      const b = document.createElement("b"); b.textContent = node.name; tip.appendChild(b);
      const sub = document.createElement("div"); sub.className = "sub";
      sub.textContent = (node.type || "") + " · " + (node.org || "no org") + " · " +
        (node.connections || 0) + " connections" + (hop !== undefined ? " · hop " + hop : "");
      tip.appendChild(sub);
      tip.style.display = "block";
    }
    function hideTooltip(){ tip.style.display = "none"; }
    $("stage").addEventListener("mousemove", (e) => {
      if (tip.style.display === "block"){ tip.style.left = (e.offsetX + 14) + "px"; tip.style.top = (e.offsetY + 14) + "px"; }
    });

    // repaint helper for non-pointer state changes (colour/search)
    function nudge(){ fg.nodeColor(fg.nodeColor()); }  // no-op setter forces a redraw

    // ---- sizing ----
    function fit(){ const r = $("stage").getBoundingClientRect(); fg.width(r.width).height(r.height); }
    fit(); new ResizeObserver(fit).observe($("stage"));

    // ---- filters + data load ----
    function populateOptions(nodes){
      const orgs = new Set(), types = new Set();
      for (const n of nodes){ if (n.org) orgs.add(n.org); if (n.type) types.add(n.type); }
      for (const [sel, vals] of [["f-org", orgs], ["f-type", types]]){
        const el = $(sel), cur = el.value;
        el.innerHTML = '<option value="">All</option>';
        [...vals].sort().forEach((v) => el.add(new Option(v, v)));
        el.value = cur;
      }
    }
    function filterQuery(){
      const p = new URLSearchParams(); p.set("min_conn", $("f-degree").value);
      if ($("f-org").value) p.set("org", $("f-org").value);
      if ($("f-type").value) p.set("type", $("f-type").value);
      return p.toString();
    }
    let loading = false;
    async function load(){
      if (loading) return; loading = true;
      const ov = $("overlay"); ov.textContent = "Loading graph…"; ov.classList.remove("hidden");
      try{
        const res = await fetch("/api/graph/canvas?" + filterQuery(), H);
        if (res.status === 413){ const i = await res.json();
          ov.textContent = "Too many nodes (" + (i.candidate_count || "5000+") + ") — raise “Min connections”.";
          loading = false; return; }
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        populateOptions(data.nodes);
        $("count").textContent = data.nodes.length + " nodes · " + data.links.length + " links";
        if (!data.nodes.length){ ov.textContent = "No entities match these filters."; loading = false; return; }
        exitEgo();
        setData(data.nodes, data.links);
        ov.classList.add("hidden");
      }catch(e){ ov.textContent = "Couldn’t load the graph. Is the daemon running?"; }
      finally{ loading = false; }
    }

    const deg = $("f-degree");
    deg.addEventListener("input", () => { $("deg-val").textContent = deg.value; });
    deg.addEventListener("change", load);
    $("f-org").addEventListener("change", load);
    $("f-type").addEventListener("change", load);
    $("f-colour").addEventListener("change", (e) => { state.colourMode = e.target.value; nudge(); });
    let searchT = null;
    $("f-search").addEventListener("input", (e) => {
      clearTimeout(searchT);
      searchT = setTimeout(() => { state.searchTerm = e.target.value.trim().toLowerCase(); nudge(); }, 150);
    });

    load();
  </script>
</body>
</html>
