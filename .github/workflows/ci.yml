name: ci

on:
  push:
  pull_request:

# This workflow runs in the exported standalone mcpbrain repo (GitHub only reads
# .github/workflows at a repo root). There the package sits at the repo root, so
# every run step operates from the checkout root with no working-directory set.
jobs:
  # Job 1 — clean-container smoke. Installs mcpbrain the way a user would
  # (uv tool install), then proves the two no-credential entry points work:
  # the daemon runs a single no-op cycle against an empty config, and the MCP
  # server answers an initialise + tools/list handshake over stdio.
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Cache uv and model downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/fastembed
            ~/.cache/huggingface
          key: mcpbrain-deps-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            mcpbrain-deps-${{ runner.os }}-

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install mcpbrain as a tool
        run: uv tool install --from . mcpbrain

      - name: Put uv tool bin on PATH
        # uv installs console scripts into ~/.local/bin. Add it for later steps.
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Smoke — daemon --once with no credentials
        # No Google token in the temp home, so the daemon must degrade to a
        # no-op cycle (no sync) and exit 0 rather than crash.
        run: |
          export MCPBRAIN_HOME="$(mktemp -d)"
          mcpbrain daemon --once

      - name: Verify package data ships in the wheel
        # packages.find ships only .py modules. Build a wheel and assert the
        # wizard HTML and the example OAuth client are inside it, so a missing
        # [tool.setuptools.package-data] block is a hard CI failure rather than
        # a silent broken install (the editable .venv install hides this).
        run: |
          uv build --wheel --out-dir dist
          uv run python - <<'PY'
          import glob
          import sys
          import zipfile

          wheels = glob.glob("dist/*.whl")
          assert wheels, "no wheel built in dist/"
          names = zipfile.ZipFile(wheels[0]).namelist()
          html = any(n.endswith("mcpbrain/wizard/index.html") for n in names)
          example = any("google_oauth_client.json.example" in n for n in names)
          print("HTML:", html)
          print("EXAMPLE:", example)
          if not (html and example):
              print("package data missing from wheel", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Smoke — mcp-server stdio initialise + tools/list
        # Drive the installed `mcpbrain mcp-server` over stdio with the MCP
        # client: initialise, list tools, assert the list is non-empty, exit 0.
        # The driver needs the `mcp` client library, so run it under
        # `uv run --with mcp` (the mcpbrain binary under test stays on PATH).
        run: |
          export MCPBRAIN_HOME="$(mktemp -d)"
          export MCPBRAIN_EMBEDDER="bge-small"
          export MCPBRAIN_BIN="$(command -v mcpbrain)"
          uv run --with mcp python - <<'PY'
          import asyncio
          import datetime as _dt
          import os
          import sys


          async def _run(command, args):
              from mcp import ClientSession
              from mcp.client.stdio import StdioServerParameters, stdio_client

              env = {
                  "HOME": os.environ.get("HOME", ""),
                  "PATH": os.environ.get("PATH", ""),
                  "MCPBRAIN_HOME": os.environ["MCPBRAIN_HOME"],
                  "MCPBRAIN_EMBEDDER": os.environ.get("MCPBRAIN_EMBEDDER", "bge-small"),
              }
              params = StdioServerParameters(command=command, args=args, env=env)
              # Generous read timeout: the spawned server loads the bge model on
              # the first request from a cold start.
              timeout = _dt.timedelta(seconds=180)
              async with stdio_client(params) as (read, write):
                  async with ClientSession(read, write, read_timeout_seconds=timeout) as session:
                      await session.initialize()
                      tools_result = await session.list_tools()
                      return sorted(t.name for t in tools_result.tools)


          command = os.environ["MCPBRAIN_BIN"]
          names = asyncio.run(_run(command, ["mcp-server"]))
          assert names, "tools/list returned an empty tool list"
          print("tools:", ", ".join(names))
          print(f"OK: {len(names)} tools listed")
          PY

  # Job 2 — full test suite. Installs the package with its dev extra (pytest)
  # into a venv and runs the suite. No external network access or credentials
  # are required, but the suite loads the local bge embedding model (~130MB on
  # first run) and test_mcp_server_stdio.py spawns a real subprocess and opens
  # localhost sockets, so it is slower than a pure unit run.
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Cache uv and model downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/fastembed
            ~/.cache/huggingface
          key: mcpbrain-deps-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            mcpbrain-deps-${{ runner.os }}-

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv and install with dev extra
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Run the offline suite
        run: .venv/bin/pytest
